# Constraint-Interaction Metric Configuration
# =============================================

grammar:
  max_depth: 8
  leaf_probability: 0.2         # chance of returning a leaf at depth > 0
  operators:
    binary: ["+", "-", "*"]
    unary: ["sin", "cos"]
  variables: ["x", "y"]
  constants:
    min: 1
    max: 9
  domain_validation:
    enabled: true
    n_test_points: 5            # quick probe; not exhaustive
    test_range: [-10, 10]

monte_carlo:
  N: 100000
  stratify_by_depth: true
  depths: [2, 4, 6, 8]
  random_seed: 42

constraints:
  structural:
    max_nested_trig: 1          # no nested sin(cos(...))
    max_consecutive_binary: 3
    enforce_c1a_only: true      # If true, ignores max_consecutive_binary (C1b) in PySR+metric
  depth:
    limit: 6
  operator_whitelist:
    allowed: ["+", "-", "*"]    # no trig
  positivity:
    # Note: implements f(x,y) >= 0 (non-negativity) per Research Plan §5,
    # not strict positivity (> 0). Key name kept as "positivity" for
    # consistency with paper/handbook terminology. See DESIGN_CONTEXT §7.
    n_test_points: 200
    domain: [-10, 10]
    rng_seed: 0
  dimensional:
    enabled: false              # optional, skip if time-constrained
    variables:
      x: "length"
      y: "time"

pysr:
  population_size: 40
  niterations: 100
  timeout_seconds: 300
  maxsize: 25
  binary_operators: ["+", "-", "*", "/"]
  unary_operators: ["sin", "cos", "exp", "log"]
  # CRITICAL: early_stop_condition makes wall-clock a meaningful S(i,j) proxy.
  # Without this, every run runs to niterations regardless of convergence quality.
  # Julia function: stop when loss < threshold AND complexity stays reasonable.
  early_stop_condition: "f(loss, complexity) = (loss < 1e-6) && (complexity < 25)"

datasets:
  - name: "feynman_ke"
    description: "Kinetic energy: 0.5 * m * v^2"
  - name: "feynman_coulomb"
    description: "Coulomb's law: q1*q2 / (4*pi*eps*r^2)"
  - name: "polynomial"
    description: "Synthetic 3-term polynomial"
  - name: "srsd_dummy"
    description: "Dummy variable test"

experiments:
  repeats: 5
  seeds: [42, 123, 456, 789, 1024]
